<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bucket — test</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ---- test-page-only styles (kept here so nothing in the live site changes) ---- */
    .bucket-wrap { padding: 28px 24px 80px; }
    .bucket-title {
      font-family: var(--grotesk); font-weight: 700; font-size: 16px;
      letter-spacing: 0.02em; text-transform: uppercase; margin: 0 0 4px;
    }
    .bucket-note { font-family: var(--mono); font-size: 11px; color: var(--muted); margin: 0 0 18px; }

    /* category toggle bar */
    .cat-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
    .cat-btn {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 6px 12px; border: 1px solid var(--ink); background: var(--paper); color: var(--ink);
      cursor: pointer; border-radius: 20px;
    }
    .cat-btn.active { background: var(--ink); color: var(--paper); }
    .cat-clear {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 6px 12px; border: 1px solid var(--hairline); background: var(--paper); color: var(--muted);
      cursor: pointer; border-radius: 20px;
    }

    /* photo grid */
    .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .gallery-item { display: block; overflow: hidden; border: 1px solid var(--hairline); background: #f4f4f4; }
    .gallery-item img {
      width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block;
      transition: transform 0.3s ease;
    }
    a.gallery-item:hover img { transform: scale(1.04); }
    a.gallery-item:hover { text-decoration: none; }
    .gallery-empty { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    @media (max-width: 1200px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 820px)  { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="bucket-wrap">
    <h1 class="bucket-title">Bucket</h1>
    <p class="bucket-note">Multi-select the labels to filter (matches any selected). Nothing selected = show all.</p>
    <div id="cat-bar" class="cat-bar"></div>
    <div id="gallery" class="gallery-grid"></div>
  </div>

  <script>
    /* ============================================================
       TEST DATA — this will move into data.js (as GALLERY /
       GALLERY_CATEGORIES) once the design is approved.
       Each item: { src, categories:[...], project?, alt? }
       - categories: the filter labels (match GALLERY_CATEGORIES)
       - project: a project id → clicking links to project.html?id=<id>
       - (no project) → not clickable
       ============================================================ */
    const GALLERY_CATEGORIES = ["Photography", "Clothing", "Animation", "Print", "Editorial", "Branding", "Illustration"];

    const GALLERY = [
      { src: "assets/img/ssd/ssd-1.jpg",  categories: ["Print", "Editorial"], project: "SSD", alt: "SSD booklet" },
      { src: "assets/img/ssd/ssd-4.jpg",  categories: ["Print", "Branding"],  project: "SSD" },
      { src: "assets/img/ssd/ssd-13.jpg", categories: ["Editorial"],          project: "SSD" },
      { src: "assets/img/solv/solv-1.jpg",  categories: ["Branding", "Illustration"], project: "solv" },
      { src: "assets/img/solv/solv-10.jpg", categories: ["Illustration", "Animation"], project: "solv" },
      { src: "assets/img/strava/strava-1.jpg", categories: ["Branding", "Animation"], project: "strava" },
      { src: "assets/img/aip/aip-1.jpg",  categories: ["Animation", "Illustration"] },
      { src: "assets/img/aip/aip-3.gif",  categories: ["Animation"] },
      { src: "assets/img/pasta/pasta-1.gif", categories: ["Animation", "Illustration"] },
      { src: "assets/img/boldthinking/boldthinking-1.jpg", categories: ["Branding", "Editorial"] },
      { src: "assets/img/newbabyironage/newbabyironage-1.jpg", categories: ["Photography", "Print"] },
      { src: "assets/img/newbabyironage/newbabyironage-5.jpg", categories: ["Photography", "Clothing"] },
    ];

    const active = new Set();
    const catBar = document.getElementById("cat-bar");
    const grid = document.getElementById("gallery");

    function renderGrid() {
      grid.innerHTML = "";
      const items = GALLERY.filter(
        (it) => active.size === 0 || it.categories.some((c) => active.has(c))
      );
      if (!items.length) {
        grid.innerHTML = '<p class="gallery-empty">No photos in those categories.</p>';
        return;
      }
      items.forEach((it) => {
        const img = document.createElement("img");
        img.src = it.src;
        img.alt = it.alt || "";
        img.loading = "lazy";
        let node;
        if (it.project) {
          node = document.createElement("a");
          node.href = "project.html?id=" + encodeURIComponent(it.project);
        } else {
          node = document.createElement("div");
        }
        node.className = "gallery-item";
        node.appendChild(img);
        grid.appendChild(node);
      });
    }

    function renderBar() {
      GALLERY_CATEGORIES.forEach((cat) => {
        const btn = document.createElement("button");
        btn.className = "cat-btn";
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          if (active.has(cat)) { active.delete(cat); btn.classList.remove("active"); }
          else { active.add(cat); btn.classList.add("active"); }
          renderGrid();
        });
        catBar.appendChild(btn);
      });
      const clear = document.createElement("button");
      clear.className = "cat-clear";
      clear.textContent = "Clear";
      clear.addEventListener("click", () => {
        active.clear();
        catBar.querySelectorAll(".cat-btn.active").forEach((b) => b.classList.remove("active"));
        renderGrid();
      });
      catBar.appendChild(clear);
    }

    renderBar();
    renderGrid();
  </script>
</body>
</html>
